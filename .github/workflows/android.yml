name: Build Android APK

# Compile l'APK v0 (debug) sur les runners GitHub, qui disposent du SDK Android
# et de l'accès réseau (Google Maven), impossibles dans le sandbox de dev.
on:
  workflow_dispatch:
  push:
    branches:
      - claude/hexagon-map-gamification-zcqrrl
    paths:
      - "src/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "capacitor.config.json"
      - "vite.config.js"
      - ".github/workflows/android.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build web (Vite)
        run: npm run build

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Add & sync Capacitor Android
        run: |
          if [ ! -d android ]; then npx cap add android; fi
          npx cap sync android
          chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk runner-arena-v0-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: runner-arena-v0-debug-apk
          path: runner-arena-v0-debug.apk
          if-no-files-found: error
