<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 720" font-family="'Segoe UI',Inter,system-ui,sans-serif">
  <defs>
    <marker id="am" markerWidth="11" markerHeight="11" refX="8" refY="3.3" orient="auto"><path d="M0,0 L8,3.3 L0,6.6 Z" fill="#6b7ba0"/></marker>
    <marker id="ao" markerWidth="11" markerHeight="11" refX="8" refY="3.3" orient="auto"><path d="M0,0 L8,3.3 L0,6.6 Z" fill="#ec7a1c"/></marker>
    <marker id="ag" markerWidth="11" markerHeight="11" refX="8" refY="3.3" orient="auto"><path d="M0,0 L8,3.3 L0,6.6 Z" fill="#34ad69"/></marker>
    <marker id="ay" markerWidth="11" markerHeight="11" refX="8" refY="3.3" orient="auto"><path d="M0,0 L8,3.3 L0,6.6 Z" fill="#f2c400"/></marker>
  </defs>
  <rect width="1120" height="720" fill="#0c1a2b"/>
  <text x="40" y="42" fill="#eaf0ff" font-size="23" font-weight="800">Runner Arena — Architecture backend (gaming + commerce)</text>
  <text x="40" y="65" fill="#8393b0" font-size="13.5">L'app affiche &amp; joue ; toute la logique vit sur un backend web séparé.</text>

  <!-- Conteneur backend -->
  <rect x="292" y="92" width="605" height="452" rx="18" fill="none" stroke="#ec7a1c" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="312" y="118" fill="#ffab4d" font-size="13" font-weight="800" letter-spacing="1">BACKEND WEB — HORS APPLICATION</text>

  <!-- App mobile -->
  <rect x="40" y="150" width="210" height="200" rx="16" fill="#14273a" stroke="#34ad69" stroke-width="2"/>
  <text x="145" y="180" fill="#7be6a6" font-size="15" font-weight="800" text-anchor="middle">App mobile</text>
  <text x="145" y="199" fill="#8393b0" font-size="11" text-anchor="middle">Android · iOS (Capacitor)</text>
  <rect x="60" y="214" width="170" height="46" rx="10" fill="#1c2233" stroke="#ffffff" stroke-opacity=".12"/>
  <text x="145" y="235" fill="#eaf0ff" font-size="12.5" font-weight="700" text-anchor="middle">LocationService</text>
  <text x="145" y="251" fill="#8393b0" font-size="10.5" text-anchor="middle">GPS · GPX</text>
  <rect x="60" y="270" width="170" height="46" rx="10" fill="#1c2233" stroke="#ffffff" stroke-opacity=".12"/>
  <text x="145" y="291" fill="#eaf0ff" font-size="12.5" font-weight="700" text-anchor="middle">GameEngine · UI</text>
  <text x="145" y="307" fill="#8393b0" font-size="10.5" text-anchor="middle">carte · Pixi · écrans</text>
  <text x="145" y="336" fill="#8393b0" font-size="11" text-anchor="middle">affiche &amp; joue</text>

  <!-- App <-> API -->
  <path d="M250,250 L306,232" stroke="#ec7a1c" stroke-width="3" fill="none" marker-end="url(#ao)"/>
  <path d="M306,268 L250,286" stroke="#6b7ba0" stroke-width="2.5" fill="none" marker-end="url(#am)"/>
  <text x="278" y="245" fill="#ec7a1c" font-size="11" font-weight="700" text-anchor="middle">REST</text>
  <text x="278" y="300" fill="#8393b0" font-size="10" text-anchor="middle">HTTPS</text>

  <!-- Admin console -->
  <rect x="312" y="132" width="565" height="46" rx="11" fill="#241b12" stroke="#f2c400" stroke-opacity=".55"/>
  <text x="594" y="153" fill="#f2c400" font-size="13" font-weight="800" text-anchor="middle">Console Admin &amp; Commerciale (web)</text>
  <text x="594" y="169" fill="#c9d3ea" font-size="10.5" text-anchor="middle">éditer badges/merveilles · sponsors &amp; offres · modération · analytics</text>

  <!-- API Gateway -->
  <rect x="312" y="198" width="128" height="180" rx="12" fill="#1c2233" stroke="#ec7a1c" stroke-width="1.6"/>
  <text x="376" y="278" fill="#ffab4d" font-size="13" font-weight="800" text-anchor="middle">API</text>
  <text x="376" y="297" fill="#ffab4d" font-size="13" font-weight="800" text-anchor="middle">Gateway</text>
  <text x="376" y="316" fill="#8393b0" font-size="11" text-anchor="middle">Auth</text>

  <!-- Services -->
  <g font-size="12.5" font-weight="700" text-anchor="middle">
    <rect x="466" y="196" width="210" height="50" rx="10" fill="#14273a" stroke="#ffffff" stroke-opacity=".14"/>
    <text x="571" y="217" fill="#eaf0ff">Game Service</text><text x="571" y="234" fill="#8393b0" font-size="10.5" font-weight="400">validation course · combat · territoire</text>
    <rect x="466" y="252" width="210" height="50" rx="10" fill="#14273a" stroke="#ffffff" stroke-opacity=".14"/>
    <text x="571" y="273" fill="#eaf0ff">Badge Service</text><text x="571" y="290" fill="#8393b0" font-size="10.5" font-weight="400">moteur de règles · attribution</text>
    <rect x="466" y="308" width="210" height="50" rx="10" fill="#14273a" stroke="#ffffff" stroke-opacity=".14"/>
    <text x="571" y="329" fill="#eaf0ff">Merveille / POI</text><text x="571" y="346" fill="#8393b0" font-size="10.5" font-weight="400">catalogue · contrôle · tiling</text>
    <rect x="466" y="364" width="210" height="50" rx="10" fill="#14273a" stroke="#ff5bb0" stroke-opacity=".5"/>
    <text x="571" y="385" fill="#ff8ec4">Commerce Service</text><text x="571" y="402" fill="#8393b0" font-size="10.5" font-weight="400">sponsors · offres · paiements</text>
    <rect x="466" y="420" width="210" height="46" rx="10" fill="#14273a" stroke="#ffffff" stroke-opacity=".14"/>
    <text x="571" y="440" fill="#eaf0ff">Leaderboard / Social</text><text x="571" y="456" fill="#8393b0" font-size="10.5" font-weight="400">classements · amis · défis</text>
  </g>
  <!-- API -> services (fan) -->
  <g stroke="#ec7a1c" stroke-width="2" fill="none">
    <path d="M440,221 L464,221" marker-end="url(#ao)"/>
    <path d="M440,258 L464,277" marker-end="url(#ao)"/>
    <path d="M440,300 L464,333" marker-end="url(#ao)"/>
    <path d="M440,338 L464,389" marker-end="url(#ao)"/>
    <path d="M440,360 L464,443" marker-end="url(#ao)"/>
  </g>
  <!-- Admin -> services -->
  <path d="M594,178 L594,194" stroke="#f2c400" stroke-width="2" stroke-dasharray="5 4" fill="none" marker-end="url(#ay)"/>

  <!-- Data -->
  <g text-anchor="middle">
    <rect x="702" y="200" width="170" height="66" rx="11" fill="#132a20" stroke="#34ad69" stroke-width="1.6"/>
    <text x="787" y="228" fill="#7be6a6" font-size="13" font-weight="800">Postgres</text>
    <text x="787" y="247" fill="#8393b0" font-size="10.5">+ PostGIS (géo/tiling)</text>
    <rect x="702" y="276" width="170" height="52" rx="11" fill="#132a20" stroke="#34ad69" stroke-opacity=".6"/>
    <text x="787" y="300" fill="#7be6a6" font-size="12.5" font-weight="700">Redis</text>
    <text x="787" y="316" fill="#8393b0" font-size="10.5">classements · cache</text>
    <rect x="702" y="338" width="170" height="52" rx="11" fill="#132a20" stroke="#34ad69" stroke-opacity=".6"/>
    <text x="787" y="362" fill="#7be6a6" font-size="12.5" font-weight="700">Object storage</text>
    <text x="787" y="378" fill="#8393b0" font-size="10.5">assets badges/merveilles</text>
  </g>
  <!-- services -> data -->
  <g stroke="#34ad69" stroke-width="2" fill="none">
    <path d="M676,221 L700,231" marker-end="url(#ag)"/>
    <path d="M676,333 L700,356" marker-end="url(#ag)"/>
    <path d="M676,443 L700,300" marker-end="url(#ag)"/>
  </g>

  <!-- POI sources -->
  <rect x="40" y="430" width="150" height="46" rx="10" fill="#241b12" stroke="#f2c400" stroke-opacity=".5"/>
  <text x="115" y="451" fill="#f2c400" font-size="12" font-weight="700" text-anchor="middle">OSM Overpass</text>
  <text x="115" y="467" fill="#8393b0" font-size="10" text-anchor="middle">monuments · quartiers</text>
  <rect x="40" y="486" width="150" height="46" rx="10" fill="#241b12" stroke="#f2c400" stroke-opacity=".5"/>
  <text x="115" y="507" fill="#f2c400" font-size="12" font-weight="700" text-anchor="middle">Wikidata</text>
  <text x="115" y="523" fill="#8393b0" font-size="10" text-anchor="middle">notoriété · images</text>
  <path d="M190,453 C320,430 380,360 464,333" stroke="#f2c400" stroke-width="2" stroke-dasharray="5 4" fill="none" marker-end="url(#ay)"/>
  <path d="M190,509 C330,500 400,380 464,345" stroke="#f2c400" stroke-width="2" stroke-dasharray="5 4" fill="none" marker-end="url(#ay)"/>
  <text x="300" y="404" fill="#f2c400" font-size="10.5" text-anchor="middle">pipeline POI → tiling</text>

  <!-- PSP -->
  <rect x="466" y="574" width="210" height="52" rx="11" fill="#2a1420" stroke="#ff5bb0" stroke-opacity=".6"/>
  <text x="571" y="598" fill="#ff8ec4" font-size="12.5" font-weight="700" text-anchor="middle">PSP</text>
  <text x="571" y="614" fill="#8393b0" font-size="10.5" text-anchor="middle">Stripe · Google Play · App Store</text>
  <path d="M560,574 L560,416" stroke="#ff5bb0" stroke-width="2" fill="none" marker-end="url(#am)"/>
  <path d="M582,416 L582,574" stroke="#ff5bb0" stroke-width="2" fill="none" marker-end="url(#am)"/>
  <text x="700" y="500" fill="#ff8ec4" font-size="10.5" text-anchor="middle">paiement · webhook</text>

  <!-- Légende -->
  <g transform="translate(720,560)" font-size="11">
    <text x="0" y="0" fill="#8393b0" font-weight="700">LÉGENDE</text>
    <line x1="0" y1="20" x2="30" y2="20" stroke="#ec7a1c" stroke-width="2.5" marker-end="url(#ao)"/><text x="40" y="24" fill="#c9d3ea">requêtes app / API</text>
    <line x1="0" y1="42" x2="30" y2="42" stroke="#34ad69" stroke-width="2.5" marker-end="url(#ag)"/><text x="40" y="46" fill="#c9d3ea">accès données</text>
    <line x1="0" y1="64" x2="30" y2="64" stroke="#f2c400" stroke-width="2.5" stroke-dasharray="5 4" marker-end="url(#ay)"/><text x="40" y="68" fill="#c9d3ea">pipeline / admin</text>
  </g>
</svg>
